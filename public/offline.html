<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>JMT OS — Offline</title>
    <link rel="icon" href="/icon-192.png" type="image/png" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
        min-height: 100dvh;
      }
      .wrap {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        gap: 18px;
      }
      img { width: 96px; height: 96px; border-radius: 22px; }
      h1 { font-size: 22px; font-weight: 700; margin: 0; }
      p { font-size: 15px; opacity: 0.72; max-width: 320px; margin: 0; line-height: 1.5; }
      button {
        background: #fff;
        color: #0a0a0a;
        border: 0;
        padding: 12px 22px;
        border-radius: 999px;
        font-size: 15px;
        font-weight: 600;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="/icon-192.png" alt="JMT" />
      <h1>You're offline</h1>
      <p>The dashboard can't reach the server right now. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
